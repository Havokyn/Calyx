[package]
name = "calyx-fuzz"
version = "0.0.0"
publish = false
edition = "2024"

[package.metadata]
cargo-fuzz = true

[workspace]

[dependencies]
calyx-aster = { path = "../crates/calyx-aster" }
calyx-core = { path = "../crates/calyx-core" }
calyx-mcp = { path = "../crates/calyx-mcp" }
calyx-sextant = { path = "../crates/calyx-sextant" }
libfuzzer-sys = "0.4"
serde_json = "1"

