path = "fuzz_targets/aster_manifest_decode.rs"
test = false
doc = false
bench = false

[[bin]]
name = "query_parse"
path = "fuzz_targets/query_parse.rs"
test = false
doc = false
bench = false

[[bin]]
name = "lens_output_decode"
